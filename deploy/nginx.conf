map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=10r/m;

upstream api_core {
    server api-core:5009;
}

upstream slides_service {
    server slides-service:5010;
}

upstream highlighter_service {
    server highlighter-service:5012;
}

upstream question_service {
    server question-service:5013;
}

upstream visual_service {
    server visual-service:5014;
}

upstream study_notes_service {
    server study-notes-service:5015;
}

upstream video_service {
    server video-service:5011;
}

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 50m;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob:; media-src 'self' blob:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self' https: ws: wss:; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;

    location = /healthz {
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Video progress streams must not be buffered.
    location ~ ^/api/(v1/)?video/(progress|script-progress)/ {
        proxy_pass http://video_service;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Internal-Gateway "${INTERNAL_GATEWAY_TOKEN}";
    }

    location /api/video/ {
        proxy_pass http://video_service;
        proxy_http_version 1.1;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Internal-Gateway "${INTERNAL_GATEWAY_TOKEN}";
    }

    location /api/v1/video/ {
        proxy_pass http://video_service;
        proxy_http_version 1.1;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Internal-Gateway "${INTERNAL_GATEWAY_TOKEN}";
    }

    location /generated/videos/ {
        proxy_pass http://video_service;
        proxy_http_version 1.1;
        proxy_read_timeout 600s;
        proxy_set_header Host $host;
        proxy_set_header X-Internal-Gateway "${INTERNAL_GATEWAY_TOKEN}";
    }

    location ~ ^/api/(v1/)?slides/(download|load_highlights)/ {
        proxy_pass http://highlighter_service;
        proxy_http_version 1.1;
        proxy_read_timeout 240s;
        proxy_send_timeout 240s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Internal-Gateway "${INTERNAL_GATEWAY_TOKEN}";
    }

    location ~ ^/api/(v1/)?slides/(classify-highlights|save_highlights)/?$ {
        proxy_pass http://highlighter_service;
        proxy_http_version 1.1;
        proxy_read_timeout 240s;
        proxy_send_timeout 240s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Internal-Gateway "${INTERNAL_GATEWAY_TOKEN}";
    }

    # Slides task streams must not be buffered.
    location ~ ^/api/(v1/)?slides/tasks/.*/stream$ {
        proxy_pass http://slides_service;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Internal-Gateway "${INTERNAL_GATEWAY_TOKEN}";
    }

    location /api/slides/ {
        proxy_pass http://slides_service;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Internal-Gateway "${INTERNAL_GATEWAY_TOKEN}";
    }

    location /api/v1/slides/ {
        proxy_pass http://slides_service;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Internal-Gateway "${INTERNAL_GATEWAY_TOKEN}";
    }

    location /api/sub1/ {
        proxy_pass http://slides_service;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_set_header Host $host;
        proxy_set_header X-Internal-Gateway "${INTERNAL_GATEWAY_TOKEN}";
