server {
    listen 80;
    server_name your-domain.com;

    # Redirect HTTP -> HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-domain.com;

    # --- SSL certificates (replace with your real paths) ---
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # --- Security headers ---
    add_header X-Frame-Options       "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff"    always;
    add_header X-XSS-Protection      "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # --- Upload size limit (match backend MAX_CONTENT_LENGTH) ---
    client_max_body_size 50m;

    # --- Frontend (Vite build output) ---
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- Backend API reverse proxy ---
    location /api/ {
        proxy_pass         http://backend:5009;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket support (for /api/chat/ws)
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # --- Static files served by backend ---
    location /static/ {
        proxy_pass http://backend:5009;
        proxy_set_header Host $host;
    }

    location /data/ {
        proxy_pass http://backend:5009;
        proxy_set_header Host $host;
    }

    location /test_pdf/ {
        proxy_pass http://backend:5009;
        proxy_set_header Host $host;
    }

    location /grading_annotated/ {
        proxy_pass http://backend:5009;
        proxy_set_header Host $host;
    }
}
