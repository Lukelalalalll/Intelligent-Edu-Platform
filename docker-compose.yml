# ============================================================
# Intelligent Edu Platform — Docker Compose (Production)
# ============================================================
# Usage:
#   1. Copy backend/.env.production → backend/.env  (fill in real values)
#   2. Copy frontend/.env.production → frontend/.env (set VITE_API_ROOT)
#   3. docker compose up --build -d
# ============================================================

services:
  # ── MongoDB ──────────────────────────────────────────────
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    expose:
      - "27017"
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"db.adminCommand('ping').ok\" | grep 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── FastAPI backend ─────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: deploy/Dockerfile.backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    env_file:
      - backend/.env
    environment:
      - MONGO_URI=mongodb://mongo:27017/intelligent_edu
      - ENV=production
      - GUNICORN_WORKERS=${GUNICORN_WORKERS:-4}
      - GUNICORN_TIMEOUT=${GUNICORN_TIMEOUT:-120}
      - GUNICORN_BIND=0.0.0.0:5009
    volumes:
      - backend_uploads:/app/backend/uploads
      - backend_static:/app/backend/static
    expose:
      - "5009"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5009/api/health', timeout=5).read()\""]
      interval: 20s
      timeout: 6s
      retries: 5
      start_period: 25s

  # ── Nginx (serves frontend + reverse-proxies API) ──────
  nginx:
    build:
      context: .
      dockerfile: deploy/Dockerfile.frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Mount your SSL certs here:
      - ./deploy/ssl:/etc/nginx/ssl:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/healthz || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── SearXNG (self-hosted meta-search engine) ───────────────────
  searxng:
    image: searxng/searxng:latest
    restart: unless-stopped
    environment:
      - SEARXNG_SECRET_KEY=${SEARXNG_SECRET_KEY:-change-this-secret}
    volumes:
      - ./deploy/searxng:/etc/searxng:rw
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/healthz || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  mongo_data:
  backend_uploads:
  backend_static:
